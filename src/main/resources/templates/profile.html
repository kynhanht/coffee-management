<div class="main-content page-profile">
    <div class="page-profile">
        <div class="row">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h5 th:text="${title}" class="card-title mb-0"></h5>
                        <a th:href="@{/logout}" class="btn btn-outline-secondary btn">Đăng xuất</a>
                    </div>
                    <div class="card-body">
                        <div class="profile-info-grid">
                            <div class="profile-info-item"><span class="profile-info-label">Họ tên</span><span
                                    th:text="${employee.hoTen}"
                                    class="profile-info-value"></span></div>
                            <div class="profile-info-item"><span class="profile-info-label">Chức vụ</span><span
                                    th:text="${employee.tenChucVu}"
                                    class="profile-info-value"></span></div>
                            <div class="profile-info-item"><span class="profile-info-label">Địa chỉ</span><span
                                    th:text="${employee.diaChi}"
                                    class="profile-info-value">12 Ngô Quyền, TP Đà Nẵng</span></div>
                            <div class="profile-info-item"><span class="profile-info-label">Lương</span><span
                                    th:text="${#numbers.formatDecimal(employee.luong, 0, 'COMMA', 0, 'POINT')}"
                                    class="profile-info-value"></span></div>
                            <div class="profile-info-item"><span class="profile-info-label">Số điện thoại</span><span
                                    th:text="${employee.soDienThoai}"
                                    class="profile-info-value"></span></div>
                        </div>
                        <hr class="border-secondary opacity-25">
                        <div class="profile-info-grid">
                            <div class="profile-info-item"><span class="profile-info-label">Tên đăng nhập</span><span
                                    th:text="${employee.tenDangNhap}"
                                    class="profile-info-value"></span></div>
                            <div class="profile-info-item"><span class="profile-info-label">Mật khẩu</span><span
                                    class="profile-info-value">*********</span></div>
                        </div>
                        <div class="d-flex justify-content-center mt-3">
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editUserModal">
                                <i class="bi bi-pencil me-1"></i> Chỉnh sửa
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chỉnh sửa thông tin cá nhân</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/profile/update}" th:object="${employee}" method="post">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <input type="hidden" th:field="*{tenDangNhap}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="hoTen">Họ tên</label>
                                <input type="text" id="hoTen" class="form-control" placeholder="Nhập họ tên"
                                       th:field="*{hoTen}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="diaChi">Địa chỉ</label>
                                <input type="text" id="diaChi" class="form-control" placeholder="Nhập địa chỉ"
                                       th:field="*{diaChi}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="soDienThoai">Số điện thoại</label>
                                <input type="text" id="soDienThoai" class="form-control"
                                       th:field="*{soDienThoai}">
                            </div>
                        </div>

                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Chỉnh sửa</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
