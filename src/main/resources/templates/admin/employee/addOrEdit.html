<div class="main-content page-users-edit">
    <div class="page-users-edit">
        <div class="page-header">
            <div>
                <h1 th:text="${title}" class="page-title"></h1>
            </div>
        </div>
        <form th:action="${action == 'add'} ? @{/admin/employees/add} : @{/admin/employees/edit}"
              th:object="${employee}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-xl-8">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="card-title">Thông tin cá nhân</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="hoTen" class="form-label required">Họ và tên</label>
                                    <input type="text" class="form-control" th:field="*{hoTen}" id="hoTen" name="hoTen"
                                           required>
                                </div>
                                <div class="col-md-12">
                                    <label for="diaChi" class="form-label">Địa chỉ</label>
                                    <input type="text" class="form-control" th:field="*{diaChi}" id="diaChi"
                                           name="diaChi">
                                </div>
                                <div class="col-md-6">
                                    <label for="chucVu" class="form-label required">Chức vụ</label>
                                    <select class="form-select" th:field="*{maChucVu}" id="chucVu" name="maChucVu"
                                            required>
                                        <option value="">Chọn chức vụ</option>
                                        <option th:each="chucVu : ${dsChucVu}"
                                                th:value="${chucVu.maChucVu}"
                                                th:text="${chucVu.tenChucVu}"
                                                th:data-luong="${#numbers.formatDecimal(chucVu.luong, 0, 'COMMA', 0, 'POINT')}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="luong" class="form-label required">Lương</label>
                                    <input type="text" class="form-control" id="luong" readonly>
                                </div>
                                <div class="col-md-12">
                                    <label for="soDienThoai" class="form-label required">Số điện thoại</label>
                                    <input type="text" class="form-control" th:field="*{soDienThoai}" id="soDienThoai"
                                           name="soDienThoai"
                                           required>
                                </div>
                                <div class="col-md-12">
                                    <label for="tenDangNhap" class="form-label">Tên đăng nhập</label>
                                    <input type="text" class="form-control" th:field="*{tenDangNhap}" id="tenDangNhap"
                                           name="tenDangNhap">
                                </div>
                                <div class="col-md-12">
                                    <label for="matKhau" class="form-label">Mật khẩu</label>
                                    <input type="password" class="form-control" th:field="*{matKhau}" id="matKhau"
                                           name="matkhau">
                                </div>
                                <div class="col-md-12" th:if="${action == 'edit'}">
                                    <input type="hidden"
                                           th:field="*{maNhanVien}"
                                           name="maNhanVien">
                                    <input type="hidden"
                                           th:field="*{anh}"
                                           name="anh">
                                    <input type="hidden"
                                           name="_method"
                                           value="put">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="card-title">Ảnh đại diện</h5>
                        </div>
                        <div class="card-body">
                            <div class="upload-avatar upload-avatar-square" id="avatar2">
                                <input type="file" name="file" accept="image/*" hidden>
                                <img th:src="${employee.anh != null}
                                             ? @{/uploads/{file}(file=${employee.anh})}
                                             : @{/assets/img/avatars/avatar-2.webp}
                                "  alt="Avatar"
                                     class="upload-avatar-img">
                                <div class="upload-avatar-overlay">
                                    <i class="bi bi-camera"></i>
                                </div>
                            </div>
                            <p class="text-muted small mt-2 text-center">Ảnh dạng JPG, PNG or WEBP. tối đa 2MB.</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ue-form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> [[${action == 'add'} ? 'Thêm mới' : 'Cập nhập']]
                </button>
                <a th:href="@{/admin/employees/list}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Update Lương theo chức vụ
        const chucVuSelect = document.querySelector("#chucVu");
        const luongInput = document.querySelector("#luong");

        function updateLuong() {
            const selectedOption = chucVuSelect.options[chucVuSelect.selectedIndex];
            luongInput.value = selectedOption.getAttribute("data-luong") || "";
        }

        updateLuong();

        chucVuSelect.addEventListener("change", updateLuong);

        // Avatar uploads
        const avatar = document.querySelector('.upload-avatar');
        const avatarInput = avatar.querySelector('input[type="file"]');
        const img = avatar.querySelector('.upload-avatar-img');
        avatar.addEventListener('click', function () {
            avatarInput.click();
        });
        avatarInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    img.src = e.target.result;
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

    });


</script>
