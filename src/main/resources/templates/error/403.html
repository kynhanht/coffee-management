<!DOCTYPE html>
<html lang="en">

<div th:replace="~{fragments/head :: head}"></div>

<body>
<div class="fx-error-page fx-error-403">
    <div class="fx-error-bg-shape shape-a"></div>
    <div class="fx-error-bg-shape shape-b"></div>

    <div class="fx-error-card">
        <a th:href="@{/}" class="fx-error-logo"><img th:src="@{assets/img/logo.webp}" alt="FlexAdmin"></a>
        <span class="fx-error-kicker">Lỗi 403</span>
        <span class="fx-error-icon warning"><i class="bi bi-shield-lock"></i></span>
        <h1 class="fx-error-code">403</h1>
        <h2 class="fx-error-title">Truy cập bị từ chối</h2>
        <p class="fx-error-text">Bạn không có quyền truy cập vào tài nguyên này. Vui lòng đăng nhập bằng tài khoản phù hợp hoặc liên hệ quản trị viên.</p>
        <div class="fx-error-actions">
            <a th:href="@{/login}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập</a>
            <a th:href="@{/}" class="btn btn-outline-secondary"><i class="bi bi-house me-1"></i> Trang chủ</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/script :: script}"></div>

</body>

</html>
