<div class="main-content page-users-edit">
    <div class="page-users-edit">
        <div class="page-header">
            <div>
                <h1 th:text="${title}" class="page-title"></h1>
            </div>
        </div>
        <form th:action="${action == 'add'} ? @{/admin/employees/add} : @{/admin/employees/edit}"
              th:object="${employee}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-xl-8">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="card-title">Thông tin cá nhân</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="fullName" class="form-label required">Họ và tên</label>
                                    <input type="text" class="form-control" th:field="*{fullName}" id="fullName" required>
                                </div>
                                <div class="col-md-12">
                                    <label for="address" class="form-label">Địa chỉ</label>
                                    <input type="text" class="form-control" th:field="*{address}" id="address">
                                </div>
                                <div class="col-md-6">
                                    <label for="positionId" class="form-label required">Chức vụ</label>
                                    <select class="form-select" th:field="*{positionId}" id="positionId" required>
                                        <option value="">Chọn chức vụ</option>
                                        <option th:each="position : ${positionList}"
                                                th:value="${position.id}"
                                                th:text="${position.name}"
                                                th:data-salary="${#numbers.formatDecimal(position.salary, 0, 'COMMA', 0, 'POINT')}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="salary" class="form-label required">Lương</label>
                                    <input type="text" class="form-control" id="salary" readonly>
                                </div>
                                <div class="col-md-12">
                                    <label for="phone" class="form-label required">Số điện thoại</label>
                                    <input type="text" class="form-control" th:field="*{phone}" id="phone" required>
                                </div>
                                <div class="col-md-12">
                                    <label for="username" class="form-label">Tên đăng nhập</label>
                                    <input type="text" class="form-control" th:field="*{username}" id="username">
                                </div>
                                <div class="col-md-12">
                                    <label for="password" class="form-label">Mật khẩu</label>
                                    <input type="password" class="form-control" th:field="*{password}" id="password">
                                </div>
                                <div class="col-md-12" th:if="${action == 'edit'}">
                                    <input type="hidden"
                                           th:field="*{id}">
                                    <input type="hidden"
                                           th:field="*{picture}">
                                    <input type="hidden"
                                           name="_method"
                                           value="put">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="card-title">Ảnh đại diện</h5>
                        </div>
                        <div class="card-body">
                            <div class="upload-avatar upload-avatar-square" id="avatar2">
                                <input type="file" name="file" accept="image/*" hidden>
                                <img th:src="${employee.picture != null}
                                             ? @{/uploads/{file}(file=${employee.picture})}
                                             : @{/assets/img/avatars/avatar-2.webp}
                                "  alt="Avatar"
                                     class="upload-avatar-img">
                                <div class="upload-avatar-overlay">
                                    <i class="bi bi-camera"></i>
                                </div>
                            </div>
                            <p class="text-muted small mt-2 text-center">Ảnh dạng JPG, PNG or WEBP. tối đa 2MB.</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ue-form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> [[${action == 'add'} ? 'Thêm mới' : 'Cập nhập']]
                </button>
                <a th:href="@{/admin/employees/list}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Update Lương theo chức vụ
        const positionSelect = document.querySelector("#positionId");
        const salaryInput = document.querySelector("#salary");

        function updateSalary() {
            const selectedOption = positionSelect.options[positionSelect.selectedIndex];
            salaryInput.value = selectedOption.getAttribute("data-salary") || "";
        }

        updateSalary();

        positionSelect.addEventListener("change", updateSalary);

        // Avatar uploads
        const avatar = document.querySelector('.upload-avatar');
        const avatarInput = avatar.querySelector('input[type="file"]');
        const img = avatar.querySelector('.upload-avatar-img');
        avatar.addEventListener('click', function () {
            avatarInput.click();
        });
        avatarInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    img.src = e.target.result;
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

    });


</script>
